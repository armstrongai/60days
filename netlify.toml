[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Stripe: https://45days.thelearningindex.com/api/stripe-webhook
# Portal: POST https://45days.thelearningindex.com/api/create-portal-session
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Marketing landing at / (SPA lives under /app/)
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200
