[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Routing (first). Publish directory is `dist` only — see scripts/merge-netlify.cjs.
# No dist/index.html: SPA entry is dist/app/app.html only.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

[[redirects]]
  from = "/app"
  to = "/app/app.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/app.html"
  status = 200

# Stripe: https://45days.thelearningindex.com/api/stripe-webhook
# Portal: POST https://45days.thelearningindex.com/api/create-portal-session
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
